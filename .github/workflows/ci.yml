name: CI Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: "grocery_inventory_testing"
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d grocery_inventory_testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend/grocery-inventory-backend

    env:
      APP_ENV: "testing"
      APP_DEBUG: "false"
      APP_KEY: "base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      APP_URL: "http://localhost:8000"
      LOG_CHANNEL: "stderr"
      DB_CONNECTION: "pgsql"
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_DATABASE: "grocery_inventory_testing"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      CACHE_STORE: "array"
      SESSION_DRIVER: "array"
      QUEUE_CONNECTION: "sync"
      MAIL_MAILER: "array"
      JWT_SECRET: "ci-test-jwt-secret-ci-test-jwt-secret-ci-test-jwt-secret"
      DASHBOARD_ALLOWED_ORIGINS: "http://localhost:3000"
      L5_SWAGGER_CONST_HOST: "http://localhost:8000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, fileinfo, iconv, intl, mbstring, openssl, pdo_pgsql, pgsql, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Set up Node.js for backend assets
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/grocery-inventory-backend/package-lock.json

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/grocery-inventory-backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate Composer files
        run: composer validate --strict --no-check-publish

      - name: Install backend dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install backend asset dependencies
        run: npm ci

      - name: Build backend assets
        run: npm run build

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan config:clear

      - name: Verify migrations and seeders
        run: |
          php artisan migrate:fresh --seed --force --no-interaction
          php artisan migrate:status

      - name: Generate OpenAPI documentation
        run: php artisan l5-swagger:generate

      - name: Run backend test suite
        run: composer test

      - name: Verify deployment cache commands
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan optimize:clear

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    env:
      CI: "true"
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000/api"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: always()
    steps:
      - name: Confirm all checks passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more CI checks failed."
            exit 1
          fi

          echo "Backend and frontend checks passed. Deployment can proceed through the external webhook."
